deptrac:
  paths:
    - ./src
  exclude_files:
    - '#.*Test.*#'
  layers:
    - name: Domain
      collectors:
        - type: directory
          value: src/Domain/.*
    - name: Application
      collectors:
        - type: directory
          value: src/Application/.*
    - name: Infrastructure
      collectors:
        - type: directory
          value: src/Infrastructure/.*
    - name: Presentation
      collectors:
        - type: directory
          value: src/Presentation/.*
    - name: Shared
      collectors:
        - type: directory
          value: src/Shared/.*
  ruleset:
    Domain: [Shared]
    Application:
      - Domain
      - Shared
    Infrastructure:
      - Application
      - Domain
      - Shared
    Presentation:
      - Application
      - Domain
      - Infrastructure
      - Shared
    Shared: ~
