# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/Entity/'
            - '../src/Kernel.php'

    # Add validator as service (not necessary if using autowiring)
    App\Application\Validator\Constraints\CategoryExistsValidator:
        tags: ['validator.constraint_validator']

    App\Application\Service\UserService:
        arguments:
            $userRepository: '@App\Domain\Repository\UserRepositoryInterface'

    App\Application\GetUser\GetUserHandler:
        arguments:
            - '@App\Domain\Repository\UserRepositoryInterface'

    App\Application\Product\CloneProductHandler:
        arguments:
            - '@App\Domain\Repository\ProductRepositoryInterface'
            - '@App\Domain\Repository\CategoryRepositoryInterface'
            - '@App\Application\Prototype\ProductCloner'

    App\Application\BuilderUserProfile\CreateUserProfileHandler:
        arguments:
            - '@App\Domain\Repository\UserRepositoryInterface'
            - '@App\Domain\Repository\UserProfileRepositoryInterface'

    App\Domain\Repository\UserRepositoryInterface:
        alias: App\Infrastructure\Persistence\DoctrineUserRepository

    App\Domain\Repository\UserProfileRepositoryInterface:
        alias: App\Infrastructure\Persistence\DoctrineUserProfileRepository

    App\Domain\Repository\ProductRepositoryInterface:
        alias: App\Infrastructure\Persistence\DoctrineProductRepository

    App\Domain\Repository\CategoryRepositoryInterface:
        alias: App\Infrastructure\Persistence\DoctrineCategoryRepository

    App\Domain\Repository\DocumentRepositoryInterface:
        alias: App\Infrastructure\Persistence\DoctrineDocumentRepository

    App\Domain\Factory\NotificationFactoryInterface:
        alias: App\Application\Factory\NotificationFactory

    App\Presentation\:
        resource: '../src/Presentation/'
        tags: ['controller.service_arguments']

    # ABSTRACT FACTORY
    App\Application\Factory\Form\HtmlFormFactory: ~
    App\Application\Factory\Form\SlackFormFactory: ~
    App\Application\Factory\Form\ConsoleFormFactory: ~

    App\Application\Factory\Form\FormFactoryResolver:
        arguments:
            $htmlFactory: '@App\Application\Factory\Form\HtmlFormFactory'
            $slackFactory: '@App\Application\Factory\Form\SlackFormFactory'
            $consoleFactory: '@App\Application\Factory\Form\ConsoleFormFactory'
    # /ABSTRACT FACTORY

    App\Application\BuilderUserProfile\BuildFormHandler:
        arguments:
            - '@App\Application\Factory\Form\FormFactoryResolver'

    App\Application\Mapper\DocumentDTOMapper:
        arguments:
            - '@App\Domain\Repository\UserRepositoryInterface'
            - '@App\Domain\Repository\DocumentRepositoryInterface'

    App\Application\Document\CreateDocumentHandler:
        arguments:
            - '@App\Domain\Repository\DocumentRepositoryInterface'
            - '@App\Application\Mapper\DocumentDTOMapper'

    App\Application\Document\UpdateDocumentContentHandler:
        arguments:
            - '@App\Domain\Repository\DocumentRepositoryInterface'
            - '@App\Application\Mapper\DocumentDTOMapper'

    App\Infrastructure\Client\FtpClient:
        arguments:
            $host: '%env(FTP_HOST)%'
            $user: '%env(FTP_USER)%'
            $password: '%env(FTP_PASSWORD)%'

    App\Infrastructure\FileStorage\FtpStorageAdapter:
        arguments:
            $client: '@App\Infrastructure\Client\FtpClient'

    # ReportServiceFactory
    App\Application\Report\ReportServiceFactory:
        arguments:
            $userContext: '@App\Shared\Security\UserContext'

    # Configure the ReportInterface to be resolved using the factory
    App\Domain\Report\ReportInterface:
        factory: ['@App\Application\Report\ReportServiceFactory', 'create']

    # Optionally, we can register the handler here if it's not already autowired
    App\Application\Report\GenerateFinancialReportHandler:
        arguments:
            $report: '@App\Domain\Report\ReportInterface'

    App\Infrastructure\Security\AccessChecker:
        arguments:
            $userContext: '@App\Shared\Security\UserContext'

    App\Shared\Security\UserContext:
        arguments:
            $roles: ['ROLE_USER']

    App\Application\Customer\Command\SyncExternalCustomerDataCommand:
        arguments:
            $customerService: '@App\Application\Customer\Service\CustomerService'
